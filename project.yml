name: Jottre
options:
  bundleIdPrefix: com.antonlorani
  deploymentTarget:
    iOS: "15.0"
  knownRegions:
    - en
    - de
    - af
    - ar
    - es
    - fr
    - hi
    - id
    - it
    - ja
    - ko
    - ms
    - nl
    - pl
    - pt-BR
    - pt-PT
    - ru
    - sv
    - th
    - tr
    - uk
    - vi

settings:
  base:
    DEVELOPMENT_TEAM: Y78RPE9KK3

targets:
  Jottre:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - Sources
      - path: Resources/Assets.xcassets
      - path: Resources/Localizable.xcstrings
    info:
      path: Resources/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.productivity
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDocumentTypes:
          - CFBundleTypeName: Jottre Jot
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.antonlorani.jottre.jot
        LSApplicationQueriesSchemes:
          - shareddocuments
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.antonlorani.jottre.jot
            UTTypeDescription: Jottre Jot
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - jot
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSQuitAlwaysKeepsWindows: true
        NSUserActivityTypes:
          - com.antonlorani.jottre.openJot
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: "Default Configuration"
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).SceneDelegate"
    entitlements:
      path: Jottre.entitlements
      properties:
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.downloads.read-write: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.antonlorani.jottre
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.antonlorani.jottre
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antonlorani.jottre
        PRODUCT_NAME: Jottre
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: YES
        MACCATALYST_UI_IDIOM: mac
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        BUNDLE_IDENTIFIER_MACCATALYST: com.antonlorani.jottre
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        VALIDATE_PRODUCT: YES
    dependencies:
      - target: AppKitPlugin
        embed: true
        codeSign: true
    postBuildScripts:
      - name: Remove AppKitPlugin for non-Catalyst builds
        script: |
          if [ "$IS_MACCATALYST" != "YES" ]; then
            rm -rf "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/AppKitPlugin.bundle"
          fi
    packages: []

  AppKitPlugin:
    type: bundle
    platform: macOS
    deploymentTarget: "12.0"
    sources:
      - AppKitPlugin
    info:
      path: AppKitPlugin/Info.plist
      properties:
        CFBundleName: AppKitPlugin
        CFBundleIdentifier: com.antonlorani.jottre.AppKitPlugin
        CFBundleVersion: 1
        CFBundleShortVersionString: 1.0
        CFBundlePackageType: BNDL
        CFBundleExecutable: AppKitPlugin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antonlorani.jottre.AppKitPlugin
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        MACH_O_TYPE: mh_bundle
        ENABLE_HARDENED_RUNTIME: YES
